db:
  # Connection type: 
  # 'sqlite' (local file)
  # 'mysql'  (external database)
  # 'api'    (remote HTTP service - requires MCSERVER_URL and MCSERVER_API_TOKEN env vars)
  type: sqlite

  # Settings for local SQLite database
  sqlite:
    # Folder path where MCBackpackSQLite will create mcbackpack.db
    path: plugins/MCBackpack
  
  # Settings for external MySQL/MariaDB database
  mysql:
    host: localhost
    port: "3306"
    database: mcbackpack
    user: root
    password: mcbackpack
    ssl: "false"

  # Note for 'api' type:
  # There are no additional yaml settings for 'api' because it reads directly from:
  # - MCSERVER_URL
  # - MCSERVER_API_TOKEN
